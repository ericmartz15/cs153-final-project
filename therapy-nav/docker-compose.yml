version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
      - SESSION_TTL_MS=7200000
      - MAX_SEARCH_RESULTS=20
      - MAX_SHORTLIST=5
      - PLAYWRIGHT_HEADLESS=true
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
